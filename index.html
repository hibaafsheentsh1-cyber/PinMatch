<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>PinMatch v1.1</title>

    <!-- Font Awesome icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>

        <!-- Navigation bar -->
        <div class="navbar">

            <!-- Logo -->
            <div class="nav-logo">
                <img src="logomain.png" class="logo">
            </div>

            <!-- Search bar -->
            <div class="nav-search">
                <input
                    type="text"
                    placeholder="Search products, brands and more...">

                <!-- Search button -->
                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- Navigation icons -->
            <div class="nav-icons">

                <!-- Upload image -->
                <div class="nav-item">
                    <i class="fa-regular fa-image"></i>
                    <span>Upload Image</span>
                </div>

                <!-- Paste link -->
                <div class="nav-item">
                    <i class="fa-solid fa-link"></i>
                    <span>Paste Link</span>
                </div>

                <!-- Wishlist -->
                <div class="nav-item">
                    <i class="fa-regular fa-heart"></i>
                    <span>Wishlist</span>
                </div>

                <!-- Sign in -->
                <div class="nav-item">
                    <i class="fa-regular fa-user"></i>
                    <span>Sign In</span>
                </div>

            </div>
        </div>
    </header>

    <!-- Hero section -->
    <section class="hero">

        <!-- Hero content -->
        <div class="hero-content">

            <!-- Main heading -->
            <h1>
                Find Same Products
                <span>at Better Prices</span>
            </h1>

            <!-- Description -->
            <p class="hero-text">
                Upload a product image or paste a shopping link and
                PinMatch will help you compare prices across stores.
            </p>

            <!-- Action buttons -->
            <div class="hero-buttons">

                <button>
                    <i class="fa-regular fa-image"></i>
                    Upload Image
                </button>

                <button>
                    <i class="fa-solid fa-link"></i>
                    Paste Link
                </button>

            </div>
        </div>

        <!-- Hero image -->
        <div class="hero-image">
            <img src="heroImg.png" alt="Shopping Cart">
        </div>

    </section>

    <!-- Categories section -->
    <section class="categories">

        <!-- Section heading -->
        <h2>Shop by Categories</h2>

        <!-- Category cards -->
        <div class="category-container">

            <!-- Phones -->
            <div class="category-card">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <h3>Phones</h3>
            </div>

            <!-- Laptops -->
            <div class="category-card">
                <i class="fa-solid fa-laptop"></i>
                <h3>Laptops</h3>
            </div>

            <!-- Shoes -->
            <div class="category-card">
                <i class="fa-solid fa-shoe-prints"></i>
                <h3>Shoes</h3>
            </div>

            <!-- Watches -->
            <div class="category-card">
                <i class="fa-regular fa-clock"></i>
                <h3>Watches</h3>
            </div>

            <!-- Bags -->
            <div class="category-card">
                <i class="fa-solid fa-bag-shopping"></i>
                <h3>Bags</h3>
            </div>

            <!-- Headphones -->
            <div class="category-card">
                <i class="fa-solid fa-headphones"></i>
                <h3>Headphones</h3>
            </div>

            <!-- Beauty -->
            <div class="category-card">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h3>Beauty</h3>
            </div>

            <!-- Home -->
            <div class="category-card">
                <i class="fa-solid fa-couch"></i>
                <h3>Home</h3>
            </div>

        </div>

    </section>

</body>
</html>
