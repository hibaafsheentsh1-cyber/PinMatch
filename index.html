<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinMatch v1.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="navbar">
        <div class="nav-logo">
            <img src="logomain.png" class="logo">
        </div>
        <div class="nav-search">
            <input
            type="text"
            placeholder="Search products, brands and more...">
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div class="nav-icons">
            <div class="nav-item">
                <i class="fa-regular fa-image"></i>
                <span>Upload Image</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-link"></i>
                <span>Paste Link</span>
            </div>
            <div class="nav-item">
                <i class="fa-regular fa-heart"></i>
                <span>Wishlist</span>
            </div>
            <div class="nav-item">
                <i class="fa-regular fa-user"></i>
                <span>Sign In</span>
            </div>
        </div>
    </div>
</header>
<section class="hero">
    <div class="hero-content">
        <h1>Find Same Products
            <span> at Better Prices</span></h1>
            <p class="hero-text">
            Upload a product image or paste a shopping link and
            PinMatch will help you compare prices across stores.
            </p>
        <div class="hero-buttons">
            <button>
                <i class="fa-regular fa-image"></i>
                Upload Image
            </button>
            <button>
                <i class="fa-solid fa-link"></i>
                    Paste Link
            </button>
            
        </div>
    </div>
    <div class="hero-image">
    <img src="heroImg.png" alt="Shopping Cart">
</div>
</section>

<section class="categories">

    <h2>Shop by Categories</h2>

    <div class="category-container">

        <div class="category-card">
            <i class="fa-solid fa-mobile-screen-button"></i>
            <h3>Phones</h3>
        </div>

        <div class="category-card">
            <i class="fa-solid fa-laptop"></i>
            <h3>Laptops</h3>
        </div>

        <div class="category-card">
            <i class="fa-solid fa-shoe-prints"></i>
            <h3>Shoes</h3>
        </div>

        <div class="category-card">
            <i class="fa-regular fa-clock"></i>
            <h3>Watches</h3>
        </div>

        <div class="category-card">
            <i class="fa-solid fa-bag-shopping"></i>
            <h3>Bags</h3>
        </div>

        <div class="category-card">
            <i class="fa-solid fa-headphones"></i>
            <h3>Headphones</h3>
        </div>

        <div class="category-card">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <h3>Beauty</h3>
        </div>

        <div class="category-card">
            <i class="fa-solid fa-couch"></i>
            <h3>Home</h3>
        </div>

    </div>
<!-- Update -->
</section>

</body>
</html>
